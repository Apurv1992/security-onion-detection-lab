title: Regsvr32 Spawning Child Process

id: 9c4b5e7a-3d2f-4e11-a789-abcdef123462

status: experimental

description: Detects child processes spawned by regsvr32.exe, which may indicate Signed Binary Proxy Execution.

references:

* https://attack.mitre.org/techniques/T1218/010/

author: Apurv Deoghare

date: 2026-06-18

logsource:
category: process_creation
product: windows

detection:

parent_process:
ParentImage|endswith:
- '\regsvr32.exe'

filter_self:
Image|endswith:
- '\regsvr32.exe'

condition: parent_process and not filter_self

fields:

* Image
* CommandLine
* ParentImage
* User

falsepositives:

* Administrative scripting activities
* Software installation processes
* Legitimate application registration tasks

level: high

tags:

* attack.defense-evasion
* attack.execution
* attack.t1218.010

