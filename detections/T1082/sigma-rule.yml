title: Suspicious System Discovery Commands
id: 8f1a2d3c-1111-2222-3333-abcdef123456
status: experimental

description: Detects suspicious system information discovery commands

logsource:
  category: process_creation
  product: windows

detection:
  selection:
    Image|endswith:
      - '\systeminfo.exe'
      - '\whoami.exe'
      - '\hostname.exe'

  parent:
    ParentImage|endswith:
      - '\powershell.exe'
      - '\cmd.exe'
      - '\wscript.exe'
      - '\winword.exe'

  condition: selection and parent

fields:
  - Image
  - CommandLine
  - ParentImage
  - User

level: medium

tags:
  - attack.discovery
  - attack.t1082
